<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Home Dashboard</title>

  <!-- GridStack -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack-extra.min.css" />

  <!-- Material Design Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7/css/materialdesignicons.min.css" />

  <!-- App styles -->
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <!-- Top toolbar (only visible in edit mode) -->
  <header id="toolbar" class="toolbar toolbar--hidden">
    <div class="toolbar__left">
      <span class="toolbar__title">Edit Layout</span>
    </div>
    <div class="toolbar__right">
      <select id="theme-select" class="btn" title="Theme">
        <option value="">Dark</option>
        <option value="light">Light</option>
        <option value="eink">E-Ink</option>
      </select>
      <button id="btn-add-tile" class="btn btn--accent" title="Add tile">
        <i class="mdi mdi-plus"></i> Add Tile
      </button>
      <button id="btn-done" class="btn btn--primary" title="Save & exit edit mode">
        <i class="mdi mdi-check"></i> Done
      </button>
    </div>
  </header>

  <!-- Dashboard grid -->
  <main id="dashboard" class="dashboard">
    <div class="grid-stack"></div>
  </main>

  <!-- Floating edit button (visible in normal mode) -->
  <button id="btn-edit" class="fab" title="Edit layout">
    <i class="mdi mdi-pencil"></i>
  </button>

  <!-- Connection status indicator -->
  <div id="status-indicator" class="status-indicator status-indicator--connecting">
    <i class="mdi mdi-circle"></i>
  </div>

  <!-- Add-tile modal -->
  <div id="add-tile-modal" class="modal modal--hidden">
    <div class="modal__backdrop"></div>
    <div class="modal__content">
      <h2>Add Tile</h2>

      <!-- Tab switcher -->
      <div class="modal__tabs">
        <button class="modal__tab modal__tab--active" data-tab="entity">Entity</button>
        <button class="modal__tab" data-tab="scene">Scene</button>
        <button class="modal__tab" data-tab="weather">Weather</button>
        <button class="modal__tab" data-tab="chart">Chart</button>
      </div>

      <!-- Entity form -->
      <div id="entity-form-section">
        <form id="add-tile-form">
          <label>
            Entity ID
            <select id="tile-entity" required>
              <option value="">Loading entities…</option>
            </select>
          </label>
          <label>
            Label
            <input id="tile-label" type="text" required placeholder="e.g. Living Room" />
          </label>
          <label>
            Icon
            <input id="tile-icon" type="text" value="mdi-lightbulb" placeholder="Search icons…" />
          </label>
          <div class="icon-picker" id="entity-icon-picker"></div>
          <label>
            Badge sensor <small style="color: var(--text-dim)">(optional — e.g. sensor.filter_life)</small>
            <input id="tile-badge-entity" type="text" placeholder="sensor.entity_id" />
          </label>
          <div class="modal__actions">
            <button type="button" id="btn-cancel-tile" class="btn">Cancel</button>
            <button type="submit" class="btn btn--primary">Add</button>
          </div>
        </form>
      </div>

      <!-- Scene form (two-step) -->
      <div id="scene-form-section" class="section--hidden">

        <!-- Step 1: pick label, icon, lights -->
        <div id="scene-step-1">
          <label>
            Label
            <input id="scene-label" type="text" placeholder="e.g. Living Room Bright" />
          </label>
          <label>
            Icon
            <input id="scene-icon" type="text" value="mdi-lightbulb-group" placeholder="Search icons…" />
          </label>
          <div class="icon-picker" id="scene-icon-picker"></div>
          <label>
            Lights to control
            <small style="display:block; color: var(--text-dim); margin: 2px 0 4px;">
              Hold Ctrl / ⌘ to select multiple
            </small>
            <select id="scene-entities" multiple>
              <option value="">Loading entities…</option>
            </select>
          </label>
          <div class="modal__actions">
            <button type="button" id="btn-cancel-scene" class="btn">Cancel</button>
            <button type="button" id="btn-scene-next" class="btn btn--primary">Next →</button>
          </div>
        </div>

        <!-- Step 2: per-light brightness sliders with live preview -->
        <div id="scene-step-2" class="section--hidden">
          <p class="scene-step-hint">Drag each slider — lights update live.</p>
          <div id="scene-member-list"></div>
          <div class="modal__actions">
            <button type="button" id="btn-scene-back" class="btn">← Back</button>
            <button type="button" id="btn-scene-confirm" class="btn btn--primary">Confirm</button>
          </div>
        </div>

      </div>

      <!-- Weather form -->
      <div id="weather-form-section" class="section--hidden">
        <form id="add-weather-form">
          <label>
            Label
            <input id="weather-label" type="text" placeholder="e.g. Home Weather" />
          </label>
          <label>
            ZIP / Postal Code
            <input id="weather-zip" type="text" required placeholder="e.g. 10001" />
          </label>
          <label>
            Country Code
            <input id="weather-country" type="text" value="US" placeholder="US" maxlength="4" />
          </label>
          <label>
            Temperature Unit
            <select id="weather-unit">
              <option value="fahrenheit">Fahrenheit (°F)</option>
              <option value="celsius">Celsius (°C)</option>
            </select>
          </label>
          <div class="modal__actions">
            <button type="button" id="btn-cancel-weather" class="btn">Cancel</button>
            <button type="submit" class="btn btn--primary">Add</button>
          </div>
        </form>
      </div>

      <!-- Chart form -->
      <div id="chart-form-section" class="section--hidden">
        <form id="add-chart-form">
          <label>
            Label
            <input id="chart-label" type="text" placeholder="e.g. Rain Chart" />
          </label>
          <label>
            ZIP / Postal Code
            <input id="chart-zip" type="text" required placeholder="e.g. 10001" />
          </label>
          <label>
            Country Code
            <input id="chart-country" type="text" value="US" placeholder="US" maxlength="4" />
          </label>
          <label>
            Temperature Unit
            <select id="chart-unit">
              <option value="fahrenheit">Fahrenheit (°F)</option>
              <option value="celsius">Celsius (°C)</option>
            </select>
          </label>
          <div class="modal__actions">
            <button type="button" id="btn-cancel-chart" class="btn">Cancel</button>
            <button type="submit" class="btn btn--primary">Add</button>
          </div>
        </form>
      </div>

    </div>
  </div>

  <!-- GridStack JS -->
  <script src="https://cdn.jsdelivr.net/npm/gridstack@10/dist/gridstack-all.js"></script>

  <!-- Scene tile JS (must load before app.js) -->
  <script src="/static/js/scene.js"></script>

  <!-- Weather tile JS (must load before app.js) -->
  <script src="/static/js/weather.js"></script>

  <!-- Forecast chart tile JS (must load before app.js) -->
  <script src="/static/js/chart.js"></script>

  <!-- App JS -->
  <script src="/static/js/app.js"></script>
</body>
</html>
